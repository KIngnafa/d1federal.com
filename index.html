<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>D1 Federal Solutions LLC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080810;
      color: #E8E8F0;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .badge {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 4px;
      color: #00E5FF;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 400;
      line-height: 1.15;
      text-align: center;
      max-width: 700px;
      margin-bottom: 16px;
    }

    h1 span {
      color: #00E5FF;
    }

    .tagline {
      font-size: clamp(14px, 2vw, 18px);
      color: #555;
      text-align: center;
      max-width: 500px;
      line-height: 1.7;
      margin-bottom: 48px;
      font-family: monospace;
    }

    .services {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
    }

    .service {
      border: 1px solid #1A1A2A;
      border-radius: 6px;
      padding: 16px 20px;
      font-family: monospace;
      font-size: 12px;
      color: #888;
      letter-spacing: 1px;
      text-align: center;
      min-width: 160px;
    }

    .service .icon {
      font-size: 20px;
      display: block;
      margin-bottom: 8px;
    }

    .cta {
      display: inline-block;
      padding: 14px 36px;
      border: 1px solid #00E5FF;
      border-radius: 4px;
      color: #00E5FF;
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 64px;
    }

    .cta:hover {
      background: #00E5FF15;
    }

    .footer {
      font-family: monospace;
      font-size: 11px;
      color: #333;
      letter-spacing: 2px;
      text-align: center;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #1A1A2A;
      margin: 0 auto 48px;
    }
  </style>
</head>
<body>

  <div class="badge">Federal Cloud Consulting</div>

  <h1>Cloud Engineering.<br/>Built for <span>Federal.</span></h1>

  <p class="tagline">
    AWS GovCloud · EKS · Compliance-as-Code · FedRAMP Advisory
  </p>

  <div class="divider"></div>

  <div class="services">
    <div class="service">
      <span class="icon">☁️</span>
      Cloud Infrastructure
    </div>
    <div class="service">
      <span class="icon">🛡️</span>
      GRC & Compliance
    </div>
    <div class="service">
      <span class="icon">⚙️</span>
      DevSecOps
    </div>
    <div class="service">
      <span class="icon">🎓</span>
      Cloud Training
    </div>
  </div>

  <a class="cta" href="mailto:hello@d1federal.com">Get In Touch</a>

  <div class="footer">
    © 2026 D1 Federal Solutions LLC · Baltimore, MD · SAM.gov Registered
  </div>

</body>
</html>
